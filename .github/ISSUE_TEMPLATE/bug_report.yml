name: 버그 제보
description: GGO CE, 런처, 스크립트에서 발생한 문제를 제보합니다.
title: "[Bug] "
labels:
  - bug
body:
  - type: dropdown
    id: area
    attributes:
      label: 문제 영역
      options:
        - GGO CE 클라이언트
        - GGO Custom Launcher
        - GGO 스크립트
        - 문서
        - 기타
    validations:
      required: true
  - type: input
    id: ce_version
    attributes:
      label: GGO CE 버전
      placeholder: "예: 1.6.1.3"
  - type: input
    id: launcher_version
    attributes:
      label: 런처 버전
      placeholder: "예: 0.1.8"
  - type: textarea
    id: summary
    attributes:
      label: 증상
      description: 어떤 문제가 발생했는지 짧게 적어 주세요.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 순서
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대한 동작
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
    validations:
      required: true
  - type: textarea
    id: attachments
    attributes:
      label: 스크린샷 또는 로그
      description: 가능하면 화면 캡처, 아이템 속성, 오류 메시지를 첨부해 주세요.

