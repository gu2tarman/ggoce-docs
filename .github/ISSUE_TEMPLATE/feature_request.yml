name: 기능 제안
description: 새 기능이나 개선 아이디어를 제안합니다.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: dropdown
    id: area
    attributes:
      label: 제안 영역
      options:
        - GGO CE 클라이언트
        - GGO Custom Launcher
        - GGO 스크립트
        - 문서
        - 기타
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 불편한 점
      description: 어떤 상황에서 왜 불편한지 적어 주세요.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 원하는 동작을 구체적으로 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 현재 우회 방법
      description: 지금은 어떻게 해결하고 있는지 알려 주세요.

